<style>
/* ================= SEU CSS ORIGINAL (NÃO ALTERADO) ================= */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --neon-pink:#ff2d78;
  --neon-cyan:#00f5ff;
  --neon-purple:#b026ff;
  --dark:#080810;
  --dark2:#0d0d1a;
  --muted:#6b6b9a;
  --text:#e8e8ff;
}
body{
  background:var(--dark);
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
  overflow-x:hidden;
}
canvas#bg{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}
.page{position:relative;z-index:2;}
#hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}
.names{
  font-family:'Orbitron';
  font-size:3rem;
  background:linear-gradient(90deg,var(--neon-cyan),var(--neon-pink),var(--neon-purple));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="page">

<!-- ================= SEU CONTEÚDO ORIGINAL INTACTO ================= -->

  <h1 class="names">Gustavo & Vitória</h1>
</section>
